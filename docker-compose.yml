version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: staffopt_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: staffopt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d staffopt"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: staffopt_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/staffopt
      - SECRET_KEY=default-dev-secret-key-ensure-to-change-in-production
    volumes:
      - ./backend:/backend
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: staffopt_frontend
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
